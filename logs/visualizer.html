<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster LLM Chess Visualizer</title>
    <!-- Outfit Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --square-light: #e2e8f0;
            --square-dark: #475569;
            --square-highlight: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-size: 1.75rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .file-input-wrapper {
            position: relative;
        }

        .custom-file-btn {
            background: var(--accent);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .custom-file-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 75px);
            overflow: hidden;
        }

        /* Sidebar move list */
        .sidebar {
            background: rgba(17, 24, 39, 0.4);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .game-meta-card {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(17, 24, 39, 0.6);
        }

        .meta-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .meta-value {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            word-break: break-all;
        }

        .meta-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-lbl {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .moves-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .moves-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }

        .move-row {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            margin-bottom: 0.5rem;
        }

        .move-row:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .move-row.active {
            background: var(--accent-glow);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .move-num {
            font-size: 0.9rem;
            color: var(--text-secondary);
            width: 30px;
            font-weight: 500;
        }

        .move-coord {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            flex: 1;
        }

        .move-meta-mini {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.75rem;
        }

        .mini-stat {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Center workspace */
        .workspace {
            display: grid;
            grid-template-columns: minmax(450px, 1fr) 1.2fr;
            overflow: hidden;
            height: 100%;
        }

        .board-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: rgba(17, 24, 39, 0.2);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .board-wrapper {
            position: relative;
            background: rgba(17, 24, 39, 0.9);
            padding: 1rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border-color);
            margin-bottom: 2rem;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            grid-template-rows: repeat(8, 55px);
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid rgba(0, 0, 0, 0.8);
        }

        .square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .light-square {
            background-color: var(--square-light);
        }

        .dark-square {
            background-color: var(--square-dark);
        }

        .square.highlighted {
            box-shadow: inset 0 0 0 4px var(--square-highlight);
            background-color: rgba(99, 102, 241, 0.15) !important;
        }

        .piece {
            width: 85%;
            height: 85%;
            object-fit: contain;
            z-index: 10;
            user-select: none;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.25));
        }

        /* Chess Board Coordinate Labels */
        .square::after {
            font-size: 0.65rem;
            font-weight: 700;
            position: absolute;
            opacity: 0.5;
            z-index: 2;
        }

        /* Rank labels (left edge) */
        .square.rank-label::after {
            content: attr(data-rank);
            left: 3px;
            top: 2px;
        }

        /* File labels (bottom edge) */
        .square.file-label::after {
            content: attr(data-file);
            right: 4px;
            bottom: 2px;
        }

        .square.rank-label.file-label::after {
            content: attr(data-rank) " / " attr(data-file);
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 440px;
            justify-content: center;
            background: rgba(17, 24, 39, 0.6);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .btn-ctrl {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.25rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.15s ease;
        }

        .btn-ctrl:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--accent);
        }

        .btn-ctrl.active {
            background: var(--accent);
            color: white;
        }

        .speed-slider-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: 1rem;
        }

        .speed-lbl {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        input[type="range"] {
            width: 80px;
            accent-color: var(--accent);
        }

        /* Thoughts Column */
        .thoughts-column {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(17, 24, 39, 0.4);
            padding: 0.5rem 1.5rem 0;
            gap: 1rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            position: relative;
            transition: color 0.15s ease;
        }

        .tab-btn:hover {
            color: white;
        }

        .tab-btn.active {
            color: white;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .thoughts-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: rgba(17, 24, 39, 0.25);
            line-height: 1.6;
        }

        /* Markdown styling inside thoughts container */
        .markdown-body {
            font-size: 0.98rem;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .markdown-body h2 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.25rem;
            font-size: 1.3rem;
        }

        .markdown-body h3 {
            font-size: 1.1rem;
        }

        .markdown-body p {
            margin-bottom: 1rem;
            color: #d1d5db;
        }

        .markdown-body ul, .markdown-body ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body li {
            margin-bottom: 0.5rem;
            color: #d1d5db;
        }

        .markdown-body code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.07);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #f43f5e;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.05);
            margin: 1rem 0;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body strong {
            color: white;
            font-weight: 600;
        }

        .markdown-body move {
            background: var(--success);
            color: black;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        /* Empty state placeholder */
        .empty-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            padding: 2rem;
            text-align: center;
            grid-column: 1 / -1;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.05);
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.5rem;
        }

        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            border: 4px dashed var(--accent);
            margin: 1.5rem;
            border-radius: 16px;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: none;
            backdrop-filter: blur(8px);
        }

        .drag-overlay.active {
            display: flex;
        }

        .drag-icon {
            font-size: 5rem;
            color: var(--accent);
            animation: bounce 2s infinite;
        }

        .drag-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <span class="logo-icon">🔮</span>
            <h1>Grandmaster LLM Chess Visualizer</h1>
        </div>
        <div class="file-input-wrapper">
            <label class="custom-file-btn">
                <span>📁 Upload Log File (.jsonl)</span>
                <input type="file" id="log-file" accept=".jsonl">
            </label>
        </div>
    </header>

    <main id="main-content">
        <!-- Will display either empty state or game views -->
        <div class="empty-placeholder" id="placeholder">
            <div class="empty-icon">♟️</div>
            <div class="empty-title">No Game Loaded</div>
            <p>Upload a `.jsonl` game log file using the button above or drag and drop the file anywhere on the screen.</p>
        </div>

        <div class="sidebar" id="sidebar" style="display: none;">
            <div class="game-meta-card" id="meta-card">
                <div class="meta-title" id="meta-model-label">Ollama Model</div>
                <div class="meta-value" id="meta-model">gemma4:e4b</div>
                
                <div class="meta-stats">
                    <div class="stat-box">
                        <div class="stat-val" id="stat-total-moves">0</div>
                        <div class="stat-lbl">Total Moves</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="stat-avg-time">0.0s</div>
                        <div class="stat-lbl">Avg Time</div>
                    </div>
                </div>
            </div>
            <div class="moves-container">
                <div class="moves-title">Move History</div>
                <div id="moves-list">
                    <!-- Dynamic move list rows -->
                </div>
            </div>
        </div>

        <div class="workspace" id="workspace" style="display: none;">
            <div class="board-column">
                <div class="board-wrapper">
                    <div id="chessboard"></div>
                </div>
                
                <div class="controls">
                    <button class="btn-ctrl" id="btn-first" title="First Move">⏮</button>
                    <button class="btn-ctrl" id="btn-prev" title="Previous Move">◀</button>
                    <button class="btn-ctrl" id="btn-play" title="Play Slideshow">▶</button>
                    <button class="btn-ctrl" id="btn-next" title="Next Move">▶</button>
                    <button class="btn-ctrl" id="btn-last" title="Last Move">⏭</button>
                    
                    <div class="speed-slider-container">
                        <span class="speed-lbl">Speed</span>
                        <input type="range" id="speed-slider" min="1000" max="5000" step="500" value="2500" title="Slideshow Speed">
                    </div>
                </div>
            </div>
            
            <div class="thoughts-column">
                <div class="tab-header">
                    <button class="tab-btn active" id="tab-thoughts">Grandmaster Thoughts</button>
                    <button class="tab-btn" id="tab-strategy">Strategic Plan</button>
                    <button class="tab-btn" id="tab-move-details">Move Metrics</button>
                </div>
                
                <div class="thoughts-container" id="tab-content-container">
                    <div id="markdown-view" class="markdown-body">
                        <!-- Rendered thoughts -->
                    </div>
                    <div id="strategy-view" style="display: none;" class="markdown-body">
                        <!-- Rendered strategy -->
                    </div>
                    <div id="metrics-view" style="display: none;">
                        <!-- Rendered metrics table -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="drag-overlay" id="drag-overlay">
        <div class="drag-icon">📥</div>
        <div class="drag-text">Drop your .jsonl file here</div>
    </div>

    <script>
        // Global State
        let gameTurns = [];
        let currentTurnIndex = 0;
        let isPlaying = false;
        let slideshowInterval = null;
        let activeTab = 'thoughts'; // 'thoughts' or 'metrics'

        // DOM elements
        const fileInput = document.getElementById('log-file');
        const placeholder = document.getElementById('placeholder');
        const sidebar = document.getElementById('sidebar');
        const workspace = document.getElementById('workspace');
        const movesList = document.getElementById('moves-list');
        const chessboard = document.getElementById('chessboard');
        
        // Metadata fields
        const metaModel = document.getElementById('meta-model');
        const statTotalMoves = document.getElementById('stat-total-moves');
        const statAvgTime = document.getElementById('stat-avg-time');
        
        // Nav controls
        const btnFirst = document.getElementById('btn-first');
        const btnPrev = document.getElementById('btn-prev');
        const btnPlay = document.getElementById('btn-play');
        const btnNext = document.getElementById('btn-next');
        const btnLast = document.getElementById('btn-last');
        const speedSlider = document.getElementById('speed-slider');
        
        // Tabs
        const tabThoughts = document.getElementById('tab-thoughts');
        const tabStrategy = document.getElementById('tab-strategy');
        const tabMoveDetails = document.getElementById('tab-move-details');
        const markdownView = document.getElementById('markdown-view');
        const strategyView = document.getElementById('strategy-view');
        const metricsView = document.getElementById('metrics-view');
        
        // Drag and drop overlay
        const dragOverlay = document.getElementById('drag-overlay');

        // Initialize drag & drop event listeners
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragOverlay.classList.add('active');
        });

        dragOverlay.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        dragOverlay.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const lines = text.split('\n');
                const turns = [];
                
                for (let line of lines) {
                    if (line.trim() !== '') {
                        try {
                            const obj = JSON.parse(line);
                            turns.push(obj);
                        } catch (e) {
                            console.error("Error parsing JSON line: ", e);
                        }
                    }
                }
                
                if (turns.length > 0) {
                    loadGame(turns);
                } else {
                    alert("Error: No valid JSON log entries found in the file.");
                }
            };
            reader.readAsText(file);
        }

        function loadGame(turns) {
            // Sort turns just in case
            gameTurns = turns.sort((a, b) => a.move_number - b.move_number);
            currentTurnIndex = 0;
            isPlaying = false;
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
            }
            btnPlay.textContent = '▶';
            
            // Show workspace & hide placeholder
            placeholder.style.display = 'none';
            sidebar.style.display = 'flex';
            workspace.style.display = 'grid';
            
            // Populate meta info
            const firstTurn = gameTurns[0];
            metaModel.textContent = firstTurn.model_name || "Unknown Model";
            statTotalMoves.textContent = gameTurns.length;
            
            let totalTime = 0;
            gameTurns.forEach(t => totalTime += t.compute_time_sec || 0);
            const avgTime = (totalTime / gameTurns.length).toFixed(1);
            statAvgTime.textContent = `${avgTime}s`;
            
            // Generate move list in sidebar
            renderMoveHistoryList();
            
            // Draw initial turn
            selectTurn(0);
        }

        function renderMoveHistoryList() {
            movesList.innerHTML = '';
            gameTurns.forEach((turn, idx) => {
                const row = document.createElement('div');
                row.className = `move-row ${idx === currentTurnIndex ? 'active' : ''}`;
                row.onclick = () => selectTurn(idx);
                
                const num = document.createElement('div');
                num.className = 'move-num';
                num.textContent = `${turn.move_number}.`;
                
                const coord = document.createElement('div');
                coord.className = 'move-coord';
                coord.textContent = turn.move || 'N/A';
                
                const meta = document.createElement('div');
                meta.className = 'move-meta-mini';
                
                const timeStat = document.createElement('div');
                timeStat.className = 'mini-stat';
                timeStat.innerHTML = `⏱️ ${(turn.compute_time_sec || 0).toFixed(1)}s`;
                
                meta.appendChild(timeStat);
                
                if (turn.retries > 0) {
                    const retryStat = document.createElement('div');
                    retryStat.className = 'mini-stat';
                    retryStat.style.color = 'var(--warning)';
                    retryStat.innerHTML = `⚠️ ${turn.retries}`;
                    meta.appendChild(retryStat);
                }
                
                row.appendChild(num);
                row.appendChild(coord);
                row.appendChild(meta);
                
                movesList.appendChild(row);
            });
        }

        function selectTurn(index) {
            // Bounds check
            if (index < 0 || index >= gameTurns.length) return;
            
            // De-activate old row
            const oldRow = movesList.children[currentTurnIndex];
            if (oldRow) oldRow.classList.remove('active');
            
            currentTurnIndex = index;
            
            // Activate new row
            const newRow = movesList.children[currentTurnIndex];
            if (newRow) {
                newRow.classList.add('active');
                newRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
            
            // Render board, thoughts, strategy, and metrics
            const turn = gameTurns[currentTurnIndex];
            drawBoard(turn.fen, turn.move);
            renderThoughts(turn);
            renderStrategy(turn);
            renderMetrics(turn);
        }

        function drawBoard(fen, lastMove) {
            chessboard.innerHTML = '';
            
            // Parse FEN
            const placement = fen.split(' ')[0];
            const ranks = placement.split('/');
            
            // Determine highlighted squares from lastMove (e.g. "e2e4")
            let highlightedSquares = [];
            if (lastMove && lastMove.length >= 4) {
                const fromSquare = lastMove.substring(0, 2);
                const toSquare = lastMove.substring(2, 4);
                highlightedSquares = [fromSquare, toSquare];
            }
            
            // Grid positions
            const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            
            for (let r = 0; r < 8; r++) {
                const rankPieces = ranks[r];
                let fileIdx = 0;
                
                for (let i = 0; i < rankPieces.length; i++) {
                    const char = rankPieces[i];
                    
                    if (isNaN(char)) {
                        // It's a piece
                        createSquare(r, fileIdx, char, highlightedSquares, files);
                        fileIdx++;
                    } else {
                        // Empty squares
                        const emptyCount = parseInt(char);
                        for (let e = 0; e < emptyCount; e++) {
                            createSquare(r, fileIdx, null, highlightedSquares, files);
                            fileIdx++;
                        }
                    }
                }
            }
        }

        function createSquare(row, col, piece, highlightedSquares, files) {
            const square = document.createElement('div');
            const isDark = (row + col) % 2 === 1;
            square.className = `square ${isDark ? 'dark-square' : 'light-square'}`;
            
            // Deduce coordinate name (e.g. "e4")
            const squareName = files[col] + (8 - row);
            
            // Check if highlighted
            if (highlightedSquares.includes(squareName)) {
                square.classList.add('highlighted');
            }
            
            // Add grid labels for visual reference
            if (col === 0) {
                square.classList.add('rank-label');
                square.setAttribute('data-rank', 8 - row);
            }
            if (row === 7) {
                square.classList.add('file-label');
                square.setAttribute('data-file', files[col]);
            }
            
            if (piece) {
                const img = document.createElement('img');
                const color = piece === piece.toUpperCase() ? 'w' : 'b';
                const type = piece.toUpperCase();
                img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/${color}${type}.png`;
                img.className = 'piece';
                img.alt = `${color === 'w' ? 'White' : 'Black'} ${type}`;
                square.appendChild(img);
            }
            
            chessboard.appendChild(square);
        }

        function renderThoughts(turn) {
            if (turn.thoughts && turn.thoughts.trim() !== '') {
                // If the LLM output tags, let's style them nicely
                let formattedThoughts = turn.thoughts;
                
                // Replace <move>...</move> tags with a styled inline block for thoughts
                formattedThoughts = formattedThoughts.replace(
                    /<move>\s*([a-h][1-8][a-h][1-8][qrbn]?)\s*<\/move>/gi,
                    '<move>$1</move>'
                );
                
                // Parse markdown
                markdownView.innerHTML = marked.parse(formattedThoughts);
            } else {
                markdownView.innerHTML = `<div style="color: var(--text-secondary); text-align: center; margin-top: 3rem;">
                    💭 No recorded thought process for this turn.
                </div>`;
            }
        }

        function renderStrategy(turn) {
            if (turn.strategy && turn.strategy.trim() !== '') {
                strategyView.innerHTML = `
                    <div style="background: rgba(99, 102, 241, 0.05); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;">
                        <h3 style="margin-top: 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; color: white;">Active Strategic Objective</h3>
                        <p style="font-size: 1.1rem; color: #a5b4fc; font-weight: 500;">${turn.strategy}</p>
                    </div>
                `;
            } else {
                strategyView.innerHTML = `<div style="color: var(--text-secondary); text-align: center; margin-top: 3rem;">
                    🎯 No recorded strategic objective for this turn.
                </div>`;
            }
        }

        function renderMetrics(turn) {
            metricsView.innerHTML = `
                <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem;">
                    <h3 style="margin-top: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; color: white;">Turn Diagnostics</h3>
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <th style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem;">Metric</th>
                            <th style="padding: 0.75rem 0.5rem; color: white; font-weight: 600; font-size: 0.95rem; text-align: right;">Value</th>
                        </tr>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-size: 0.95rem;">Move Number</td>
                            <td style="padding: 0.75rem 0.5rem; color: white; font-weight: 600; text-align: right;">${turn.move_number}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-size: 0.95rem;">Move Played</td>
                            <td style="padding: 0.75rem 0.5rem; color: var(--success); font-family: monospace; font-weight: 700; font-size: 1.1rem; text-align: right;">${turn.move || 'N/A'}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-size: 0.95rem;">Computation Time</td>
                            <td style="padding: 0.75rem 0.5rem; color: white; font-weight: 600; text-align: right;">${(turn.compute_time_sec || 0).toFixed(2)} seconds</td>
                        </tr>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-size: 0.95rem;">Prolog Rejections (Retries)</td>
                            <td style="padding: 0.75rem 0.5rem; color: ${turn.retries > 0 ? 'var(--warning)' : 'white'}; font-weight: 600; text-align: right;">${turn.retries}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-size: 0.95rem; vertical-align: top;">Active Strategy</td>
                            <td style="padding: 0.75rem 0.5rem; color: #a5b4fc; font-weight: 500; text-align: right; font-size: 0.95rem; max-width: 250px; word-break: break-word;">${turn.strategy || 'N/A'}</td>
                        </tr>
                        <tr>
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-size: 0.95rem; vertical-align: top;">FEN Position State</td>
                            <td style="padding: 0.75rem 0.5rem; color: var(--text-secondary); font-family: monospace; font-size: 0.85rem; text-align: right; word-break: break-all; max-width: 250px;">${turn.fen}</td>
                        </tr>
                    </table>
                </div>
            `;
        }

        // Tab selection event listeners
        tabThoughts.addEventListener('click', () => {
            tabThoughts.classList.add('active');
            tabStrategy.classList.remove('active');
            tabMoveDetails.classList.remove('active');
            markdownView.style.display = 'block';
            strategyView.style.display = 'none';
            metricsView.style.display = 'none';
            activeTab = 'thoughts';
        });

        tabStrategy.addEventListener('click', () => {
            tabStrategy.classList.add('active');
            tabThoughts.classList.remove('active');
            tabMoveDetails.classList.remove('active');
            markdownView.style.display = 'none';
            strategyView.style.display = 'block';
            metricsView.style.display = 'none';
            activeTab = 'strategy';
        });

        tabMoveDetails.addEventListener('click', () => {
            tabMoveDetails.classList.add('active');
            tabThoughts.classList.remove('active');
            tabStrategy.classList.remove('active');
            markdownView.style.display = 'none';
            strategyView.style.display = 'none';
            metricsView.style.display = 'block';
            activeTab = 'metrics';
        });

        // Navigation controls event listeners
        btnFirst.addEventListener('click', () => selectTurn(0));
        btnPrev.addEventListener('click', () => selectTurn(currentTurnIndex - 1));
        btnNext.addEventListener('click', () => selectTurn(currentTurnIndex + 1));
        btnLast.addEventListener('click', () => selectTurn(gameTurns.length - 1));

        btnPlay.addEventListener('click', () => {
            if (isPlaying) {
                pauseSlideshow();
            } else {
                startSlideshow();
            }
        });

        function startSlideshow() {
            if (gameTurns.length === 0) return;
            isPlaying = true;
            btnPlay.textContent = '⏸';
            btnPlay.classList.add('active');
            
            // Loop back to start if at last move
            if (currentTurnIndex === gameTurns.length - 1) {
                selectTurn(0);
            }
            
            const speed = parseInt(speedSlider.value);
            slideshowInterval = setInterval(() => {
                if (currentTurnIndex < gameTurns.length - 1) {
                    selectTurn(currentTurnIndex + 1);
                } else {
                    pauseSlideshow();
                }
            }, speed);
        }

        function pauseSlideshow() {
            isPlaying = false;
            btnPlay.textContent = '▶';
            btnPlay.classList.remove('active');
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
            }
        }

        speedSlider.addEventListener('change', () => {
            if (isPlaying) {
                // Restart slideshow with new speed
                pauseSlideshow();
                startSlideshow();
            }
        });
    </script>
</body>
</html>
